name: AddressSanitizer (ASan) CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  asan:
    name: ASan — Rust (nightly) + C
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            clang \
            lld \
            libclang-dev \
            libusb-1.0-0-dev \
            libpcsclite-dev \
            pkg-config \
            python3

      - name: Setup Rust (nightly) and components
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          profile: minimal

      - name: Add rust-src (required for building instrumented std)
        run: |
          rustup component add rust-src --toolchain nightly

      - name: Build and test Rust crate with ASan
        env:
          # Tell ASan to abort on error so CI fails fast and provides diagnostics
          ASAN_OPTIONS: "detect_leaks=1:abort_on_error=1:symbolize=1"
          # Nightly-only sanitizer flag — instrument both the crate and std.
          RUSTFLAGS: "-Zsanitizer=address"
          RUSTDOCFLAGS: "-Zsanitizer=address"
        run: |
          cargo +nightly test -Z build-std --target x86_64-unknown-linux-gnu \
            --manifest-path rust/libnfc-rs/Cargo.toml --features "nfc_secure nfc_secure_debug test_helpers asan_tests" -- --nocapture

      - name: Configure and build C components with ASan
        run: |
          cmake -S . -B build-asan -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer -g -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address"
          cmake --build build-asan --parallel

      - name: Run C unit tests
        run: |
          ctest --test-dir build-asan --output-on-failure || true

      - name: Collect ASan logs (if any)
        if: always()
        run: |
          echo "=== Searching for ASan output files and logs ==="
          grep -R --line-number "ERROR: AddressSanitizer" || true
          # Show any .log or sanitizer dumps to help debugging
          find . -type f -name "*asan*.log" -print -exec sed -n '1,200p' {} \; || true
