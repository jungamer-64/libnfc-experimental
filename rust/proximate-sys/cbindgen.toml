language = "C"
namespace = "libnfc_rs"
include_guard = "LIBNFC_RS_H"
pragma_once = true
include_version = true
header = """
// This header is generated by cbindgen. Do not edit manually.
// Regenerate with: python3 rust/proximate-sys/tools/generate_cbindgen_header.py --output rust/proximate-sys/include/libnfc_rs.h

// Manually-provided macros for values that cbindgen cannot emit
#define LOG_CATEGORY "libnfc.common"
#define MALLOC_LABEL "malloc"
#define NFC_BUFSIZE_CONNSTRING 1024
#define NFC_COMMON_SUCCESS 0
#define NFC_COMMON_ERROR -1
#define LOG_GROUP_GENERAL 1
#define LOG_PRIORITY_ERROR 1
#define LOG_PRIORITY_DEBUG 3
#if defined(_MSC_VER)
#include <BaseTsd.h>
typedef SSIZE_T ssize_t;
#else
#include <sys/types.h>
#endif

typedef struct nfc_driver nfc_driver;
"""
trailer = "/* End of generated header */\n"

[parse]
parse_deps = false
exclude = ["criterion", "libc"]

[export]
include = [
    "nfc_close",
    "nfc_free",
    "nfc_version",
    "str_nfc_baud_rate",
    "str_nfc_modulation_type",
    "str_nfc_target",
]

# Explicitly exclude debug-only helpers from the stable header output.
exclude = [
    "nfc_buffers_overlap",
    "nfc_check_suspicious_size",
    "LOG_CATEGORY",
    "MALLOC_LABEL",
    "c_free",
