language = "C"
namespace = "libnfc_rs"
include_guard = "LIBNFC_RS_H"
pragma_once = true
include_version = true
header = "// This header is generated by cbindgen. Do not edit manually.\n// Regenerate with: python3 rust/proximate-sys/tools/generate_cbindgen_header.py --output rust/proximate-sys/include/libnfc_rs.h\n\n// Manually-provided macros for values that cbindgen cannot emit\n#define LOG_CATEGORY \"libnfc.common\"\n#define MALLOC_LABEL \"malloc\"\n#define DEVICE_NAME_LENGTH 256\n#define MAX_USER_DEFINED_DEVICES 4\n#define NFC_BUFSIZE_CONNSTRING 1024\n#define NFC_COMMON_SUCCESS 0\n#define NFC_COMMON_ERROR -1\n#define LOG_GROUP_GENERAL 1\n#define LOG_PRIORITY_ERROR 1\n#define LOG_PRIORITY_DEBUG 3\n#define NFC_SECURE_SUCCESS 0\n#define NFC_SECURE_ERROR_INVALID -1\n#define NFC_SECURE_ERROR_OVERFLOW -2\n#define NFC_SECURE_ERROR_RANGE -3\n#define NFC_SECURE_ERROR_ZERO_SIZE -4\n#define NFC_SECURE_ERROR_INTERNAL -5\ntypedef struct nfc_driver nfc_driver;\n"
trailer = "/* End of generated header */\n"

[parse]
parse_deps = true
include = ["proximate"]
exclude = ["criterion", "libc"]

[export]
include = [
    "nfc_parse_connstring",
    "nfc_build_connstring",
    "connstring_decode",
    "nfc_get_last_error",
    "nfc_clear_last_error",
    "nfc_set_last_error",
    "nfc_context_alloc_defaults",
    "nfc_device_new",
    "nfc_device_free",
    "nfc_close",
    "nfc_free",
    "nfc_version",
    "nfc_safe_memcpy",
    "nfc_safe_memmove",
    "nfc_secure_memset",
    "nfc_secure_zero",
    "nfc_secure_strerror",
    "nfc_safe_strlen",
    "nfc_is_null_terminated",
    "nfc_ensure_null_terminated",
    "str_nfc_baud_rate",
    "str_nfc_modulation_type",
    "str_nfc_target",

    "nfc_rs_free",
]

# Explicitly exclude debug-only helpers from the stable header output.
exclude = [
    "nfc_buffers_overlap",
    "nfc_check_suspicious_size",
    "LOG_CATEGORY",
    "MALLOC_LABEL",
    "c_free",
    "nfc_driver",
    "nfc_context_new",
    "nfc_rs_context_conf_load",
    "nfc_rs_context_log_init",
    "nfc_rs_context_log_exit",
    "nfc_rs_log_message",
    "nfc_context_free",
    "nfc_register_driver",
    "nfc_open",
    "nfc_list_devices",
    "nfc_init",
    "nfc_exit",
    "nfc_device_set_property_int",
    "nfc_device_set_property_bool",
    "nfc_initiator_init",
    "nfc_initiator_init_secure_element",
    "nfc_initiator_select_passive_target",
    "nfc_initiator_list_passive_targets",
    "nfc_initiator_poll_target",
    "nfc_initiator_select_dep_target",
    "nfc_initiator_poll_dep_target",
    "nfc_initiator_deselect_target",
    "nfc_initiator_target_is_present",
    "nfc_target_init",
    "nfc_initiator_transceive_bytes",
    "nfc_initiator_transceive_bits",
    "nfc_initiator_transceive_bytes_timed",
    "nfc_initiator_transceive_bits_timed",
    "nfc_target_send_bytes",
    "nfc_target_receive_bytes",
    "nfc_target_send_bits",
    "nfc_target_receive_bits",
    "nfc_abort_command",
    "nfc_idle",
    "nfc_device_get_name",
    "nfc_device_get_connstring",
    "nfc_device_get_supported_modulation",
    "nfc_device_get_supported_baud_rate",
    "nfc_device_get_supported_baud_rate_target_mode",
    "nfc_device_get_information_about",
    "nfc_device_get_last_error",
    "nfc_strerror",
    "nfc_strerror_r",
    "nfc_perror",
]

[defines]
# Map Rust cfgs and features to C preprocessor defines so cbindgen can
# wrap feature-gated symbols with appropriate #ifdef guards.
# Keys must be valid TOML strings representing the cfg expression.
"test" = "RUST_TEST"

# Multiple key variants to cover different stringification styles emitted
# by cbindgen when it reports missing defines. This ensures the mapping
# is recognized regardless of spacing or whether `cfg(...)` is included.
"feature = \"secure\"" = "RUST_SECURE"
"feature=\"secure\"" = "RUST_SECURE"
"cfg(feature = \"secure\")" = "RUST_SECURE"
"cfg(feature=\"secure\")" = "RUST_SECURE"

"feature = \"nfc_secure_debug\"" = "NFC_SECURE_DEBUG"
"feature=\"nfc_secure_debug\"" = "NFC_SECURE_DEBUG"
"cfg(feature = \"nfc_secure_debug\")" = "NFC_SECURE_DEBUG"
"cfg(feature=\"nfc_secure_debug\")" = "NFC_SECURE_DEBUG"

"feature = \"lifecycle\"" = "RUST_LIFECYCLE"
"feature=\"lifecycle\"" = "RUST_LIFECYCLE"
"cfg(feature = \"lifecycle\")" = "RUST_LIFECYCLE"
"cfg(feature=\"lifecycle\")" = "RUST_LIFECYCLE"

"feature = \"orchestration\"" = "RUST_ORCHESTRATION"
"feature=\"orchestration\"" = "RUST_ORCHESTRATION"
"cfg(feature = \"orchestration\")" = "RUST_ORCHESTRATION"
"cfg(feature=\"orchestration\")" = "RUST_ORCHESTRATION"

"feature = \"c_ffi\"" = "RUST_C_FFI"
"feature=\"c_ffi\"" = "RUST_C_FFI"
"cfg(feature = \"c_ffi\")" = "RUST_C_FFI"
"cfg(feature=\"c_ffi\")" = "RUST_C_FFI"

"feature = \"asan_tests\"" = "ASAN_TESTS"
"feature=\"asan_tests\"" = "ASAN_TESTS"
"cfg(feature = \"asan_tests\")" = "ASAN_TESTS"
"cfg(feature=\"asan_tests\")" = "ASAN_TESTS"

# Build-time detection cfgs emitted by build.rs. Map them to the
# corresponding C preprocessor macros used across the project so
# cbindgen can wrap items with the same guards the C code expects.
"have_memset_explicit" = "HAVE_MEMSET_EXPLICIT"
"cfg(have_memset_explicit)" = "HAVE_MEMSET_EXPLICIT"

"have_memset_s" = "HAVE_MEMSET_S"
"cfg(have_memset_s)" = "HAVE_MEMSET_S"

"have_explicit_bzero" = "HAVE_EXPLICIT_BZERO"
"cfg(have_explicit_bzero)" = "HAVE_EXPLICIT_BZERO"

"have_secure_zero_memory" = "HAVE_SECURE_ZERO_MEMORY"
"cfg(have_secure_zero_memory)" = "HAVE_SECURE_ZERO_MEMORY"

# Also add single-quoted keys as some cbindgen versions stringify
# cfg expressions in slightly different ways; adding both forms is
# harmless and may silence additional missing-define warnings.

# Additional mappings for composite/wrapped cfg expressions that
# cbindgen may emit when parsing attribute expressions. These cover
# forms like `any(...)`, `all(...)`, and `not(...)` that include a
# `feature = "secure"` sub-expression so the generator can
# correctly map them to the C preprocessor macro `RUST_SECURE`.
"any(feature = \"secure\")" = "RUST_SECURE"
"any(feature=\"secure\")" = "RUST_SECURE"
"cfg(any(feature = \"secure\"))" = "RUST_SECURE"
"cfg(any(feature=\"secure\"))" = "RUST_SECURE"

"all(feature = \"secure\")" = "RUST_SECURE"
"all(feature=\"secure\")" = "RUST_SECURE"
"cfg(all(feature = \"secure\"))" = "RUST_SECURE"
"cfg(all(feature=\"secure\"))" = "RUST_SECURE"

"not(feature = \"secure\")" = "RUST_SECURE"
"not(feature=\"secure\")" = "RUST_SECURE"
"cfg(not(feature = \"secure\"))" = "RUST_SECURE"
"cfg(not(feature=\"secure\"))" = "RUST_SECURE"
