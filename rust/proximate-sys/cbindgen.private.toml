language = "C"
namespace = "libnfc_rs"
include_guard = "LIBNFC_RS_PRIVATE_H"
pragma_once = true
include_version = true
header = """
// This header is generated by cbindgen. Do not edit manually.
// Repo-local private header; not installed.
// Regenerate with: python3 rust/proximate-sys/tools/generate_cbindgen_header.py --config rust/proximate-sys/cbindgen.private.toml --output rust/proximate-sys/include/libnfc_rs_private.h

// Manually-provided macros for values that cbindgen cannot emit
#define LOG_CATEGORY "libnfc.common"
#define MALLOC_LABEL "malloc"
#define NFC_BUFSIZE_CONNSTRING 1024
#define NFC_SUCCESS 0
#define NFC_EIO -1
#define NFC_EINVARG -2
#define NFC_EDEVNOTSUPP -3
#define NFC_ENOTSUCHDEV -4
#define NFC_EOVFLOW -5
#define NFC_ETIMEOUT -6
#define NFC_EOPABORTED -7
#define NFC_ENOTIMPL -8
#define NFC_ETGRELEASED -10
#define NFC_ERFTRANS -20
#define NFC_EMFCAUTHFAIL -30
#define NFC_ESOFT -80
#define NFC_ECHIP -90
#define NFC_COMMON_SUCCESS 0
#define NFC_COMMON_ERROR -1
#define LOG_GROUP_GENERAL 1
#define LOG_PRIORITY_ERROR 1
#define LOG_PRIORITY_DEBUG 3
#define NFC_SECURE_SUCCESS 0
#define NFC_SECURE_ERROR_INVALID -1
#define NFC_SECURE_ERROR_OVERFLOW -2
#define NFC_SECURE_ERROR_RANGE -3
#define NFC_SECURE_ERROR_ZERO_SIZE -4
#define NFC_SECURE_ERROR_INTERNAL -5

#if defined(_MSC_VER)
#include <BaseTsd.h>
typedef SSIZE_T ssize_t;
#else
#include <sys/types.h>
#endif

void nfc_rs_log_message(unsigned char group, const char *category, unsigned char priority, const char *message);
"""
trailer = "/* End of generated private header */\n"

[parse]
parse_deps = false
exclude = ["criterion", "libc"]

[export]
include = [
    "nfc_dep_info",
    "nfc_iso14443a_info",
    "nfc_felica_info",
    "nfc_iso14443b_info",
    "nfc_iso14443bi_info",
    "nfc_iso14443biclass_info",
    "nfc_iso14443b2sr_info",
    "nfc_iso14443b2ct_info",
    "nfc_jewel_info",
    "nfc_barcode_info",
    "nfc_target_info",
    "nfc_modulation",
    "nfc_target",
    "nfc_driver_scan_fn",
    "nfc_driver_open_fn",
    "nfc_driver_close_fn",
    "nfc_driver_strerror_fn",
    "nfc_driver_initiator_init_fn",
    "nfc_driver_initiator_init_secure_element_fn",
    "nfc_driver_initiator_select_passive_target_fn",
    "nfc_driver_initiator_poll_target_fn",
    "nfc_driver_initiator_select_dep_target_fn",
    "nfc_driver_initiator_deselect_target_fn",
    "nfc_driver_initiator_transceive_bytes_fn",
    "nfc_driver_initiator_transceive_bits_fn",
    "nfc_driver_initiator_transceive_bytes_timed_fn",
    "nfc_driver_initiator_transceive_bits_timed_fn",
    "nfc_driver_initiator_target_is_present_fn",
    "nfc_driver_target_init_fn",
    "nfc_driver_target_send_bytes_fn",
    "nfc_driver_target_receive_bytes_fn",
    "nfc_driver_target_send_bits_fn",
    "nfc_driver_target_receive_bits_fn",
    "nfc_driver_device_set_property_bool_fn",
    "nfc_driver_device_set_property_int_fn",
    "nfc_driver_get_supported_modulation_fn",
    "nfc_driver_get_supported_baud_rate_fn",
    "nfc_driver_device_get_information_about_fn",
    "nfc_driver_device_control_fn",
    "nfc_emulation_io_fn",
    "nfc_emulator",
    "nfc_emulation_state_machine",
    "pn53x_io_send_fn",
    "pn53x_io_receive_fn",
    "pn532_sam_mode",
    "nfc_rs_context_log_init",
    "nfc_rs_context_log_exit",
    "nfc_rs_log_message",
]
exclude = [
    "nfc_buffers_overlap",
    "nfc_check_suspicious_size",
    "LOG_CATEGORY",
    "MALLOC_LABEL",
    "c_free",
]

[defines]
"test" = "RUST_TEST"

"feature = \"secure\"" = "RUST_SECURE"
"feature=\"secure\"" = "RUST_SECURE"
"cfg(feature = \"secure\")" = "RUST_SECURE"
"cfg(feature=\"secure\")" = "RUST_SECURE"

"feature = \"nfc_secure_debug\"" = "NFC_SECURE_DEBUG"
"feature=\"nfc_secure_debug\"" = "NFC_SECURE_DEBUG"
"cfg(feature = \"nfc_secure_debug\")" = "NFC_SECURE_DEBUG"
"cfg(feature=\"nfc_secure_debug\")" = "NFC_SECURE_DEBUG"

