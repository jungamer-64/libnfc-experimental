[package]
name = "proximate"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
name = "proximate"

[dependencies]
nusb = { version = "0.2", optional = true }

[features]
default = ["lifecycle", "orchestration", "usb_helper"]
lifecycle = []
orchestration = ["lifecycle"]
usb_helper = ["dep:nusb"]
# Feature used by the nightly ASan job to compile sanitizer-only tests cleanly.
asan_tests = []
